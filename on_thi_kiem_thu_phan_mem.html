
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; max-width: 680px; }
.header { margin-bottom: 1.5rem; }
.header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
.progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin: 1rem 0; }
.progress-fill { height: 100%; background: #5340c8; border-radius: 2px; transition: width 0.3s; }
.stats { display: flex; gap: 12px; margin-bottom: 1.5rem; }
.stat { flex: 1; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.q-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.q-num { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.q-text { font-size: 15px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1rem; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); cursor: pointer; transition: background 0.15s, border-color 0.15s; font-size: 14px; color: var(--color-text-primary); background: var(--color-background-primary); }
.opt:hover { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
.opt.correct { background: #eaf3de; border-color: #3b6d11; color: #3b6d11; }
.opt.wrong { background: #fcebeb; border-color: #a32d2d; color: #a32d2d; }
.opt.reveal { background: #eaf3de; border-color: #3b6d11; color: #3b6d11; }
.opt.disabled { cursor: default; pointer-events: none; }
.opt-letter { font-weight: 500; min-width: 20px; }
.feedback { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: var(--border-radius-md); }
.feedback.ok { background: #eaf3de; color: #3b6d11; }
.feedback.err { background: #fcebeb; color: #a32d2d; }
.nav { display: flex; gap: 10px; margin-top: 1rem; align-items: center; }
.nav button { padding: 8px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; }
.nav button:hover { background: var(--color-background-secondary); }
.nav button.primary { background: #5340c8; color: #fff; border-color: #5340c8; }
.nav button.primary:hover { background: #3c2fa0; }
.nav button:disabled { opacity: 0.4; cursor: default; }
.q-counter { font-size: 13px; color: var(--color-text-secondary); margin-left: auto; }
.result-box { text-align: center; padding: 2rem 1rem; }
.result-box .big { font-size: 48px; font-weight: 500; color: #5340c8; }
.result-box .sub { font-size: 16px; color: var(--color-text-secondary); margin-top: 8px; }
.result-box .msg { font-size: 15px; color: var(--color-text-primary); margin-top: 1rem; }
.mode-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; cursor: pointer; margin-top: 1rem; margin-right: 8px; }
.mode-btn.active { background: #5340c8; color: #fff; border-color: #5340c8; }
</style>

<div id="app">
  <div class="header">
    <h2>Kiểm thử & Đảm bảo chất lượng phần mềm</h2>
    <p>100 câu trắc nghiệm ôn thi</p>
    <div style="margin-top: 10px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="mode-btn active" id="btn-all" onclick="setMode('all')">Tất cả (100 câu)</button>
      <button class="mode-btn" id="btn-random" onclick="setMode('random')">Ngẫu nhiên 20 câu</button>
      <button class="mode-btn" id="btn-wrong" onclick="setMode('wrong')">Ôn sai (<span id="wrong-count">0</span>)</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Đã làm</div></div>
    <div class="stat"><div class="stat-num" id="s-correct" style="color:#3b6d11">0</div><div class="stat-label">Đúng</div></div>
    <div class="stat"><div class="stat-num" id="s-wrong" style="color:#a32d2d">0</div><div class="stat-label">Sai</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Tỉ lệ đúng</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div id="q-area"></div>
  <div class="nav">
    <button onclick="prevQ()" id="btn-prev" disabled>← Trước</button>
    <button onclick="nextQ()" id="btn-next">Tiếp →</button>
    <button class="primary" onclick="restartQuiz()">Làm lại</button>
    <span class="q-counter" id="q-pos">1 / 100</span>
  </div>
</div>

  {q:"Coverage càng cao:",o:["Khả năng bao phủ kiểm thử càng lớn","Chương trình chạy nhanh hơn","Bộ nhớ giảm","Không liên quan"],a:0},
  {q:"Defect Life Cycle mô tả:",o:["Vòng đời của lỗi","Vòng đời dự án","Vòng đời khách hàng","Vòng đời cơ sở dữ liệu"],a:0},
  {q:"Trạng thái đầu tiên của lỗi thường là:",o:["New","Closed","Deferred","Rejected"],a:0},
  {q:"Trạng thái cuối cùng sau khi xác nhận sửa thành công:",o:["Open","Assigned","Closed","Reopen"],a:2},
  {q:"Kiểm thử phi chức năng bao gồm:",o:["Hiệu năng","Logic nghiệp vụ","Tính toán","Thuật toán"],a:0},
  {q:"Usability Testing đánh giá:",o:["Tính dễ sử dụng","Tốc độ CPU","Dung lượng RAM","Độ phức tạp mã nguồn"],a:0},
  {q:"Compatibility Testing kiểm tra:",o:["Khả năng tương thích môi trường","Tính toán","Dữ liệu","Thuật toán"],a:0},
  {q:"Monkey Testing là:",o:["Kiểm thử ngẫu nhiên","Kiểm thử đơn vị","Kiểm thử tích hợp","Kiểm thử hồi quy"],a:0},
  {q:"Kiểm thử nào thường được thực hiện đầu tiên?",o:["Unit Test","Acceptance Test","System Test","Beta Test"],a:0},
  {q:"Trong Agile, kiểm thử nên:",o:["Thực hiện liên tục","Thực hiện cuối dự án","Không cần thực hiện","Thực hiện sau triển khai"],a:0},
  {q:"Continuous Testing thường kết hợp với:",o:["CI/CD","ERP","CRM","VPN"],a:0},
  {q:"Mục đích của Test Environment:",o:["Cung cấp môi trường kiểm thử","Quản lý tài chính","Thiết kế giao diện","Quản lý nhân sự"],a:0},
  {q:"Kết quả thực tế của Test Case gọi là:",o:["Actual Result","Expected Result","Requirement","Severity"],a:0},
  {q:"Nếu Actual Result khác Expected Result:",o:["Có thể tồn tại lỗi","Chắc chắn đúng","Không cần kiểm tra","Bỏ qua"],a:0},
  {q:"Một Test Case có thể cho kết quả:",o:["Pass hoặc Fail","Compile hoặc Link","Upload hoặc Download","Save hoặc Print"],a:0},
  {q:"Test Report được lập sau:",o:["Hoàn thành kiểm thử","Bắt đầu dự án","Thiết kế hệ thống","Thu thập yêu cầu"],a:0},
  {q:"Mục tiêu của QA là:",o:["Đảm bảo quy trình tạo ra chất lượng","Viết mã nguồn","Quản lý mạng","Thiết kế đồ họa"],a:0},
  {q:"QC tập trung vào:",o:["Phát hiện lỗi trên sản phẩm","Tuyển dụng nhân sự","Lập ngân sách","Quản lý kho"],a:0}
];

let mode = 'all';
let questions = [...ALL_Q];
let cur = 0;
let answered = {};
let wrongSet = new Set();

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  if (m === 'all') { questions = ALL_Q.map((q,i)=>({...q,origIdx:i})); }
  else if (m === 'random') {
    let arr = ALL_Q.map((q,i)=>({...q,origIdx:i}));
    for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    questions = arr.slice(0,20);
  } else {
    if(wrongSet.size === 0) { alert('Chưa có câu sai nào!'); return; }
    questions = [...wrongSet].map(i=>({...ALL_Q[i],origIdx:i}));
  }
  cur = 0; answered = {};
  render();
}

function render() {
  if (questions.length === 0) { document.getElementById('q-area').innerHTML = '<div class="result-box"><p>Không có câu hỏi.</p></div>'; return; }
  const total = questions.length;
  const done = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v=>v).length;
  const wrong = done - correct;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-pct').textContent = done > 0 ? Math.round(correct/done*100) + '%' : '0%';
  document.getElementById('prog').style.width = Math.round(done/total*100) + '%';
  document.getElementById('q-pos').textContent = (cur+1) + ' / ' + total;
  document.getElementById('wrong-count').textContent = wrongSet.size;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').textContent = cur === total-1 ? 'Kết quả' : 'Tiếp →';

  if (cur >= total) { showResult(); return; }
  const q = questions[cur];
  const qi = q.origIdx !== undefined ? q.origIdx : cur;
  const isAnswered = answered[cur] !== undefined;
  const letters = ['A','B','C','D'];
  let optsHtml = q.o.map((opt, i) => {
    let cls = 'opt';
    if (isAnswered) {
      cls += ' disabled';
      if (i === q.a) cls += ' correct';
      else if (answered[cur] === false && i === q.selectedIdx) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="answer(${i})" data-idx="${i}"><span class="opt-letter">${letters[i]}.</span> ${opt}</div>`;
  }).join('');

  let feedback = '';
  if (isAnswered) {
    if (answered[cur]) feedback = `<div class="feedback ok">✓ Chính xác! Đáp án đúng: ${letters[q.a]}. ${q.o[q.a]}</div>`;
    else feedback = `<div class="feedback err">✗ Sai rồi! Đáp án đúng: ${letters[q.a]}. ${q.o[q.a]}</div>`;
  }

  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <div class="q-num">Câu ${qi+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    </div>`;
}

function answer(idx) {
  if (answered[cur] !== undefined) return;
  const q = questions[cur];
  const correct = idx === q.a;
  q.selectedIdx = idx;
  answered[cur] = correct;
  const qi = q.origIdx !== undefined ? q.origIdx : cur;
  if (!correct) wrongSet.add(qi); else wrongSet.delete(qi);
  render();
}

function nextQ() {
  if (cur >= questions.length - 1) { showResult(); return; }
  cur++; render();
}

function prevQ() { if (cur > 0) { cur--; render(); } }

function showResult() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v=>v).length;
  const pct = Math.round(correct/total*100);
  let msg = pct >= 80 ? '🎉 Xuất sắc! Bạn đã nắm vững kiến thức.' : pct >= 60 ? '👍 Khá tốt! Ôn lại các câu sai nhé.' : '📚 Cần ôn tập thêm. Hãy thử lại!';
  document.getElementById('q-area').innerHTML = `
    <div class="result-box">
      <div class="big">${pct}%</div>
      <div class="sub">${correct} / ${total} câu đúng</div>
      <div class="msg">${msg}</div>
      ${wrongSet.size > 0 ? `<br><button class="mode-btn" onclick="setMode('wrong')">Ôn lại ${wrongSet.size} câu sai</button>` : ''}
    </div>`;
  document.getElementById('wrong-count').textContent = wrongSet.size;
}

function restartQuiz() { cur = 0; answered = {}; wrongSet = new Set(); setMode(mode); }

render();
</script>
